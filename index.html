<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="png" href="images/to-do-list.png" />
    <title>Todo-App</title>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>
          <i class="fa-solid fa-circle-check"></i>
          My Tasks
        </h1>
        <p>Monday, May 5</p>
      </div>

      <div class="input-container">
        <form action="">
          <input
            type="text"
            id="todo-item"
            placeholder="What do you need to do?"
          />
          <button type="submit">
            <i class="fa-solid fa-plus"></i>
          </button>
        </form>
      </div>

      <div class="filters-container">
        <button id="all-btn">All</button>
        <button id="active-btn">Active</button>
        <button id="completed-btn">Completed</button>
      </div>
      <!-- this will show the list of todods -->
      <div class="todo-list"></div>

      <div class="footer">
        <p><span>0</span> items left</p>
        <button>Clear completed</button>
      </div>
    </div>

    <script
      src="https://kit.fontawesome.com/783d5fc8be.js"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
